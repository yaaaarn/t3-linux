name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v25

      - name: Build ISO
        run: nix build .#packages.x86_64-linux.default

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.sha_short }}
          name: ${{ github.sha_short }}
          artifacts: result/*.iso
          makeLatest: true
